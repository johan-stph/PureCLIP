name: Update Homebrew tap

on:
  push:
    tags:
      - "v*"

jobs:
  update-tap:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Create release tarball URL
        id: vars
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          URL="https://github.com/johan-stph/PureCLIP/archive/refs/tags/${TAG}.tar.gz"
          echo "tag=${TAG}"       >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "url=${URL}"       >> "$GITHUB_OUTPUT"

      - name: Compute sha256
        id: sha
        run: |
          curl -fsSL "${{ steps.vars.outputs.url }}" -o pureclip.tar.gz
          SHA=$(sha256sum pureclip.tar.gz | awk '{print $1}')
          echo "sha256=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: johan-stph/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          FORMULA="homebrew-tap/Formula/pureclip2.rb"
          sed -i "s|url \".*\"|url \"${{ steps.vars.outputs.url }}\"|" "$FORMULA"
          sed -i "s|sha256 \".*\"|sha256 \"${{ steps.sha.outputs.sha256 }}\"|" "$FORMULA"

      - name: Commit and push to tap
        working-directory: homebrew-tap
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/pureclip2.rb
          git commit -m "chore: bump pureclip2 to ${{ steps.vars.outputs.tag }}"
          git push
