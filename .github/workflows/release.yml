name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # needed to create GitHub Releases and upload assets

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # macOS · Apple Silicon (arm64)
  # ─────────────────────────────────────────────────────────────────────────────
  release-macos-arm64:
    name: Build · macOS arm64
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: brew install gsl libomp boost

      - name: Configure
        run: |
          mkdir build && cd build
          cmake ../src \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$(brew --prefix boost)" \
            -DGSL_ROOT_DIR="$(brew --prefix gsl)"

      - name: Build
        run: make -C build -j$(sysctl -n hw.logicalcpu)

      - name: Verify
        run: |
          ./build/pureclip --version
          file build/pureclip | grep -q arm64 && echo "✓ native arm64 binary"

      - name: Package
        run: |
          TAG="${GITHUB_REF_NAME}"
          mkdir -p dist
          cp build/pureclip   dist/pureclip
          cp build/winextract dist/winextract
          tar -czf "pureclip-${TAG}-macos-arm64.tar.gz" -C dist pureclip winextract

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pureclip-macos-arm64
          path: pureclip-*-macos-arm64.tar.gz

  # ─────────────────────────────────────────────────────────────────────────────
  # Linux · x86_64
  # ─────────────────────────────────────────────────────────────────────────────
  release-linux-x86:
    name: Build · Linux x86_64
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake g++ libgsl-dev libboost-dev zlib1g-dev libbz2-dev

      - name: Configure
        run: |
          mkdir build && cd build
          cmake ../src -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: make -C build -j$(nproc)

      - name: Verify
        run: |
          ./build/pureclip --version
          file build/pureclip | grep -q x86-64 && echo "✓ native x86_64 binary"

      - name: Package
        run: |
          TAG="${GITHUB_REF_NAME}"
          mkdir -p dist
          cp build/pureclip   dist/pureclip
          cp build/winextract dist/winextract
          tar -czf "pureclip-${TAG}-linux-x86_64.tar.gz" -C dist pureclip winextract

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pureclip-linux-x86_64
          path: pureclip-*-linux-x86_64.tar.gz

  # ─────────────────────────────────────────────────────────────────────────────
  # Linux · arm64
  # ─────────────────────────────────────────────────────────────────────────────
  release-linux-arm64:
    name: Build · Linux arm64
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake g++ libgsl-dev libboost-dev zlib1g-dev libbz2-dev

      - name: Configure
        run: |
          mkdir build && cd build
          cmake ../src -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: make -C build -j$(nproc)

      - name: Verify
        run: |
          ./build/pureclip --version
          file build/pureclip | grep -q aarch64 && echo "✓ native aarch64 binary"

      - name: Package
        run: |
          TAG="${GITHUB_REF_NAME}"
          mkdir -p dist
          cp build/pureclip   dist/pureclip
          cp build/winextract dist/winextract
          tar -czf "pureclip-${TAG}-linux-arm64.tar.gz" -C dist pureclip winextract

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pureclip-linux-arm64
          path: pureclip-*-linux-arm64.tar.gz

  # ─────────────────────────────────────────────────────────────────────────────
  # Create GitHub Release and attach all binaries
  # ─────────────────────────────────────────────────────────────────────────────
  github-release:
    name: Publish GitHub Release
    needs: [release-macos-arm64, release-linux-x86, release-linux-arm64]
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "PureCLIP ${{ github.ref_name }}"
          generate_release_notes: true
          files: artifacts/*.tar.gz
